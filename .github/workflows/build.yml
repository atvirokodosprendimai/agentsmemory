name: build

# Agile binary artifacts. Cross-compile the server on every push to main and on
# every PR, so each commit yields downloadable binaries you can grab from the
# Actions run. On a strict vX.Y.Z tag, the same archives (plus a checksum file)
# are attached to the GitHub Release as permanent assets.
#
# Division of labour: the sibling release.yml owns the container image; this
# workflow owns the raw binaries. They run independently off the same tag.
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:

# Least privilege by default: the test and build jobs only read the repo. Only
# the release job (which creates/updates a Release and uploads assets) escalates
# to contents:write, and it does so at job scope.
permissions:
  contents: read

jobs:
  # Gate every binary on a green tree: vet + the full test suite. No artifact is
  # ever produced from code that fails to vet or test — a downloadable binary
  # implies it passed CI.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  # Cross-compile the static binary for each target. CGO is off (pure-Go SQLite
  # via modernc), so every GOOS/GOARCH builds on the linux runner with no C
  # cross-toolchain. fail-fast: false so one bad target does not cancel the rest.
  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # -trimpath strips local filesystem paths for reproducible builds; -s -w
      # drop the symbol table and DWARF for a smaller binary. The committed
      # *_templ.go are built as-is, so no templ generation step is needed.
      - name: Build
        run: |
          bin=agentsmemory
          [ "${{ matrix.goos }}" = windows ] && bin=agentsmemory.exe
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags='-s -w' -o "$bin" ./cmd/server

      # Conventional archives: tar.gz for unix, zip for windows. The archive name
      # is version-free — the Actions run (or the release tag) supplies the
      # version, and a branch ref name could contain a slash that is unsafe in a
      # filename. The release job derives a versioned asset set from the tag.
      - name: Archive
        id: archive
        run: |
          name="agentsmemory_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = windows ]; then
            zip "$name.zip" agentsmemory.exe
            echo "file=$name.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf "$name.tar.gz" agentsmemory
            echo "file=$name.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      # Every push/PR keeps its binaries downloadable from the Actions run for 14
      # days — the agile "every commit is runnable" loop. The release job below
      # re-gathers these same archives for tag builds.
      - uses: actions/upload-artifact@v4
        with:
          name: agentsmemory_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ${{ steps.archive.outputs.file }}
          retention-days: 14

  # Tag-only: gather every matrix archive, checksum them, and attach them to the
  # GitHub Release. A single dedicated job owns the Release so concurrent matrix
  # jobs never race to create-or-update it. The push trigger's 'v*.*.*' glob and
  # this ref guard together restrict assets to version tags.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/update the Release and upload assets
    steps:
      # merge-multiple flattens all per-target artifacts into one dist/ folder.
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # One checksum file over every archive so downloaders can verify integrity.
      - name: Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      # softprops creates the Release if the tag has none yet (a pushed tag does
      # not auto-create one) and uploads the assets. A tag containing '-' (e.g.
      # v1.2.3-rc1) is marked pre-release. fail_on_unmatched_files guards against
      # a silently empty upload if the globs ever stop matching.
      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
