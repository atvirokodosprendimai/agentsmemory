name: build

# Server binaries, gated on version tags. Every push to main and every PR runs
# the test job (vet + full suite) so branches and PRs stay protected, but the
# cross-compile and GitHub Release upload run ONLY on a strict semantic-version
# tag like v1.2.3 — never on a branch push, a PR, or a loose tag such as v1,
# v1.2, or a pre-release like v1.2.3-rc1.
#
# The push trigger's 'v*.*.*' glob already needs two dots, but a glob cannot
# assert "digits only / exactly three parts" (GitHub Actions has no regex here),
# so the `check` job does the strict match and gates the build/release jobs —
# mirroring the sibling release.yml, which owns the container image off the same
# tag. The two workflows run independently.
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:

# Least privilege by default: the test and build jobs only read the repo. Only
# the release job (which creates/updates a Release and uploads assets) escalates
# to contents:write, and it does so at job scope.
permissions:
  contents: read

jobs:
  # Strict version-tag gate. Emits release=true only for a full vX.Y.Z tag on a
  # tag ref, so the build + release jobs skip branch pushes, PRs, and loose tags
  # (v1, v1.2, v1.2.3-rc1). The refs/tags guard matters here because this
  # workflow — unlike release.yml — also triggers on branches, so a branch that
  # happened to be named "v1.2.3" must not be mistaken for a release.
  check:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.semver.outputs.release }}
    steps:
      - id: semver
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" == refs/tags/* && "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Building release for $tag"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=skipped::$tag is not a strict vX.X.X tag; skipping binary build."
          fi

  # Gate every binary on a green tree: vet + the full test suite. Runs on every
  # push and PR (this is the CI safety net for branches), independent of the tag
  # gate above — the build job depends on both.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  # Cross-compile the static binary for each target. CGO is off (pure-Go SQLite
  # via modernc), so every GOOS/GOARCH builds on the linux runner with no C
  # cross-toolchain. fail-fast: false so one bad target does not cancel the rest.
  # Tag-only: needs both a passing `test` and a `check` verdict of release=true,
  # so cross-compiles run on strict version tags, not on every push/PR.
  build:
    needs: [test, check]
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # -trimpath strips local filesystem paths for reproducible builds; -s -w
      # drop the symbol table and DWARF for a smaller binary. The committed
      # *_templ.go are built as-is, so no templ generation step is needed.
      - name: Build
        run: |
          bin=agentsmemory
          [ "${{ matrix.goos }}" = windows ] && bin=agentsmemory.exe
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags='-s -w' -o "$bin" ./cmd/server

      # Conventional archives: tar.gz for unix, zip for windows. The archive name
      # is version-free — the Actions run (or the release tag) supplies the
      # version, and a branch ref name could contain a slash that is unsafe in a
      # filename. The release job derives a versioned asset set from the tag.
      - name: Archive
        id: archive
        run: |
          name="agentsmemory_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = windows ]; then
            zip "$name.zip" agentsmemory.exe
            echo "file=$name.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf "$name.tar.gz" agentsmemory
            echo "file=$name.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      # On a tag build, each target's archive is uploaded as a run artifact (kept
      # 14 days) so the release job below can re-gather every target into one
      # dist/ folder. Because the whole build job is tag-gated, these artifacts
      # exist only for version tags, not for ordinary pushes/PRs.
      - uses: actions/upload-artifact@v4
        with:
          name: agentsmemory_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ${{ steps.archive.outputs.file }}
          retention-days: 14

  # Strict-tag-only: gather every matrix archive, checksum them, and attach them
  # to the GitHub Release. A single dedicated job owns the Release so concurrent
  # matrix jobs never race to create-or-update it. It inherits the `check` gate
  # transitively through `build`, but asserts it explicitly too so the intent is
  # local to the job.
  release:
    needs: [check, build]
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/update the Release and upload assets
    steps:
      # merge-multiple flattens all per-target artifacts into one dist/ folder.
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # One checksum file over every archive so downloaders can verify integrity.
      - name: Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      # softprops creates the Release if the tag has none yet (a pushed tag does
      # not auto-create one) and uploads the assets. The `check` gate only admits
      # strict vX.Y.Z tags, so a pre-release like v1.2.3-rc1 never reaches this
      # job — no prerelease flag is needed. fail_on_unmatched_files guards against
      # a silently empty upload if the globs ever stop matching.
      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
